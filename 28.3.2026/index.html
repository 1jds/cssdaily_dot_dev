<div class="card">
  <div class="card-header">
    <span class="tag">🎬 Movie Night</span>
    <span class="vote-count">12 votes</span>
  </div>
  <div class="movie-title">Dune: Part Two</div>
  <div class="movie-meta">
    <span class="meta-item">2024</span>
    <span class="dot"></span>
    <span class="meta-item">Sci-Fi</span>
    <span class="dot"></span>
    <span class="meta-item">2h 46m</span>
  </div>
  <div class="rating-bar-wrap">
    <div class="rating-label">
      <span>Audience Score</span>
      <span class="rating-pct">84%</span>
    </div>
    <div class="rating-bar">
      <div class="rating-fill"></div>
    </div>
  </div>
  <div class="options">
    <div class="option option--yes">
      <span class="option-icon">👍</span>
      <span class="option-label">Watch It</span>
      <span class="option-count">9</span>
    </div>
    <div class="option option--maybe">
      <span class="option-icon">🤔</span>
      <span class="option-label">Maybe</span>
      <span class="option-count">2</span>
    </div>
    <div class="option option--no">
      <span class="option-icon">👎</span>
      <span class="option-label">Skip</span>
      <span class="option-count">1</span>
    </div>
  </div>
  <div class="card-footer">
    <div class="avatars">
      <div class="avatar av1">A</div>
      <div class="avatar av2">B</div>
      <div class="avatar av3">C</div>
      <div class="avatar av4">+9</div>
    </div>
    <button class="vote-btn">Cast Your Vote</button>
  </div>
</div>
