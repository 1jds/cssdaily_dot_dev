<div class="explorer-card">
  <div class="card-header">
    <div class="header-left">
      <span class="mission-label">MISSION LOG</span>
      <h2 class="card-title">Solar System Explorer</h2>
    </div>
    <div class="orbit-badge">
      <span class="orbit-number">SOL-9</span>
    </div>
  </div>

  <div class="planets-grid">
    <div class="planet-item featured">
      <div class="planet-visual mercury"></div>
      <div class="planet-info">
        <span class="planet-name">Mercury</span>
        <span class="planet-stat">57.9M km</span>
      </div>
      <span class="planet-tag rocky">Rocky</span>
    </div>
    <div class="planet-item">
      <div class="planet-visual venus"></div>
      <div class="planet-info">
        <span class="planet-name">Venus</span>
        <span class="planet-stat">108M km</span>
      </div>
      <span class="planet-tag hot">Hot</span>
    </div>
    <div class="planet-item">
      <div class="planet-visual mars"></div>
      <div class="planet-info">
        <span class="planet-name">Mars</span>
        <span class="planet-stat">227M km</span>
      </div>
      <span class="planet-tag rocky">Rocky</span>
    </div>
    <div class="planet-item">
      <div class="planet-visual jupiter"></div>
      <div class="planet-info">
        <span class="planet-name">Jupiter</span>
        <span class="planet-stat">778M km</span>
      </div>
      <span class="planet-tag gas">Gas</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-block">
      <span class="stat-value">8</span>
      <span class="stat-label">Planets</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-value">290</span>
      <span class="stat-label">Moons</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-value">4.6B</span>
      <span class="stat-label">Years Old</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-block">
      <span class="stat-value">1 AU</span>
      <span class="stat-label">Earth Dist.</span>
    </div>
  </div>

  <div class="card-footer">
    <div class="progress-section">
      <span class="progress-label">Exploration Progress</span>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <span class="progress-pct">74%</span>
    </div>
    <button class="launch-btn">Launch Mission</button>
  </div>
</div>
